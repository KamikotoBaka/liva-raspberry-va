shell_commands:
  linux:
    restart_apache: ["systemctl", "restart", "apache2"]
    stop_apache: ["systemctl", "stop", "apache2"]
    restart_nginx: ["systemctl", "restart", "nginx"]
    system_status: ["systemctl", "status", "apache2"]
    check_disk: ["df", "-h"]
    check_memory: ["free", "-h"]
    check_time: ["date", "+%H:%M:%S"]
    check_date: ["date", "+%Y-%m-%d"]
    check_uptime: ["uptime", "-p"]
    check_hostname: ["hostname"]
    open_spotify: ["xdg-open", "spotify:"]
    open_outlook: ["xdg-open", "https://outlook.office.com"]
    open_teams: ["xdg-open", "https://teams.microsoft.com"]

  windows:
    restart_apache: ["powershell", "-NoProfile", "-Command", "Restart-Service -Name Apache2.4"]
    stop_apache: ["powershell", "-NoProfile", "-Command", "Stop-Service -Name Apache2.4"]
    restart_nginx: ["powershell", "-NoProfile", "-Command", "Restart-Service -Name nginx"]
    system_status: ["powershell", "-NoProfile", "-Command", "Get-Service -Name Apache2.4"]
    check_disk: ["powershell", "-NoProfile", "-Command", "Get-PSDrive -PSProvider FileSystem | Select-Object Name,Used,Free"]
    check_memory: ["powershell", "-NoProfile", "-Command", "Get-CimInstance Win32_OperatingSystem | Select-Object TotalVisibleMemorySize,FreePhysicalMemory"]
    check_time: ["powershell", "-NoProfile", "-Command", "Get-Date -Format HH:mm:ss"]
    check_date: ["powershell", "-NoProfile", "-Command", "Get-Date -Format yyyy-MM-dd"]
    check_uptime: ["powershell", "-NoProfile", "-Command", "(Get-Date) - (Get-CimInstance Win32_OperatingSystem).LastBootUpTime"]
    check_hostname: ["powershell", "-NoProfile", "-Command", "$env:COMPUTERNAME"]
    open_spotify: ["powershell", "-NoProfile", "-Command", "Start-Process 'spotify:'"]
    open_outlook: ["powershell", "-NoProfile", "-Command", "$fixed = 'C:\\Program Files\\Microsoft Office\\Root\\Office16\\OUTLOOK.EXE'; if (Test-Path $fixed) { Start-Process $fixed; exit 0 }; $exe = $null; if (Get-Command outlook.exe -ErrorAction SilentlyContinue) { $exe = (Get-Command outlook.exe).Source }; if ($exe) { Start-Process $exe; exit 0 }; $candidates = @('$env:ProgramFiles\\Microsoft Office\\root\\Office16\\OUTLOOK.EXE','$env:ProgramFiles(x86)\\Microsoft Office\\root\\Office16\\OUTLOOK.EXE','$env:ProgramFiles\\Microsoft Office\\Office16\\OUTLOOK.EXE','$env:ProgramFiles(x86)\\Microsoft Office\\Office16\\OUTLOOK.EXE'); foreach ($p in $candidates) { $expanded = [Environment]::ExpandEnvironmentVariables($p); if (Test-Path $expanded) { Start-Process $expanded; exit 0 } }; Write-Error 'Outlook Classic executable not found'; exit 1"]
    open_teams: ["powershell", "-NoProfile", "-Command", "if (Get-Command ms-teams.exe -ErrorAction SilentlyContinue) { Start-Process ms-teams.exe } else { Start-Process 'msteams:' }"]
